<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GST Report Generator</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages: GitHub Pages has no server-side
      // rewrites, so a direct hit on /gst-report-generator/items 404s here.
      // Re-encode the intended path into a query string and redirect back
      // to index.html, which decodes it (see index.html) and hands off to
      // the client-side router.
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1

      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
